name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parallel_usdp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d parallel_usdp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parallel_usdp_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/parallel_usdp_test
      HYPEREVM_RPC_URL: https://rpc.example.invalid
      FINALITY_LAG: 5
      RPC_LOG_CHUNK_SIZE: 5000
      PRICE_SOURCE: unconfigured
      REFRESH_INTERVAL_SECONDS: 30
      RUN_NETWORK_TESTS: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run check
